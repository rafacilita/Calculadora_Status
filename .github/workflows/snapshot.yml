name: Snapshot diário CRR5 (D-1) + Fechamento Mensal

on:
  workflow_dispatch:
  schedule:
    # 00:10 BRT (UTC-3) => 03:10 UTC
    - cron: "10 3 * * *"

permissions:
  contents: write

concurrency:
  group: crr5-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TZ: America/Sao_Paulo
      METRICS_URL: ${{ secrets.METRICS_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run snapshot (D-1) + monthly close (day 1)
        run: node scripts/snapshot.js

      - name: Commit & push (if changed)
        shell: bash
        run: |
          set -e

          git config user.name "crr5-snapshot-bot"
          git config user.email "crr5-snapshot-bot@users.noreply.github.com"

          # evita falha se tiver commit novo no remoto
          git pull --rebase origin main || true

          # ✅ FIX: não usa glob, adiciona por pasta
          git add -A data month || true

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore(snapshot): daily snapshot + monthly close"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
