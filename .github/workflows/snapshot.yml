name: Snapshot diário CRR5 (D-1) + Fechamento Mensal

on:
  workflow_dispatch:
  schedule:
    # Diário: 00:10 BRT (UTC-3) => 03:10 UTC
    - cron: "10 3 * * *"
    # Candidato a fechamento mensal: 23:55 BRT => 02:55 UTC
    # (o script só executa se HOJE for o último dia do mês em BRT)
    - cron: "55 2 * * *"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TZ: America/Sao_Paulo
      METRICS_URL: ${{ secrets.METRICS_URL }}
      RUN_CRON: ${{ github.event.schedule }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run snapshot
        id: snap
        run: node scripts/snapshot.js
        continue-on-error: true

      - name: Commit & push (if changed)
        run: |
          git config user.name "crr5-snapshot-bot"
          git config user.email "crr5-snapshot-bot@users.noreply.github.com"

          # evita falha se tiver commit novo no remoto
          git pull --rebase origin main || true

          if [ -n "$(git status --porcelain)" ]; then
            # sem glob pra não dar pathspec
            git add data month || true
            git commit -m "chore(snapshot): daily snapshot"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Fail se snapshot falhou (depois de commitar _failed)
        if: steps.snap.outcome == 'failure'
        run: |
          echo "::error::Snapshot falhou após retries. Ver data/_failed/"
          exit 1
