name: Snapshot diário CRR5

on:
  schedule:
    # 05:10 UTC = 02:10 BRT (UTC-3). Pode ajustar depois.
    - cron: "10 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: snapshot-diario
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rodar snapshot (1x)
        env:
          METRICS_URL: ${{ secrets.METRICS_URL }}
        run: |
          node scripts/snapshot.js

      - name: Commit e push (se tiver mudança)
        run: |
          if git status --porcelain | grep .; then
            git config user.name "crr5-snapshot-bot"
            git config user.email "crr5-snapshot-bot@users.noreply.github.com"
            git add data/*.json
            git commit -m "chore(snapshot): daily metrics snapshot"
            git push
          else
            echo "Sem mudanças para commitar."
          fi
