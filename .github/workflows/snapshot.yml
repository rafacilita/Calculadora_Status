name: Snapshot diário CRR5 (D-1) + Fechamento Mensal

on:
  workflow_dispatch:
  schedule:
    # 00:10 BRT (UTC-3) => 03:10 UTC
    - cron: "10 3 * * *"

permissions:
  contents: write

concurrency:
  group: snapshot-crr5
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TZ: America/Sao_Paulo
      METRICS_URL: ${{ secrets.METRICS_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sanity check (METRICS_URL)
        run: |
          set -euo pipefail
          if [ -z "${METRICS_URL:-}" ]; then
            echo "ERRO: secret METRICS_URL não está definido."
            exit 1
          fi
          echo "METRICS_URL = ${METRICS_URL}"
          # valida se endpoint responde e tem ok:true
          curl -fsSL "${METRICS_URL}" | head -c 300
          echo ""
          if ! curl -fsSL "${METRICS_URL}" | grep -q '"ok"[[:space:]]*:[[:space:]]*true'; then
            echo "ERRO: METRICS_URL não retornou ok:true."
            exit 1
          fi

      - name: Run snapshot (D-1) + monthly close (day 1)
        run: |
          set -euo pipefail
          node -v
          node scripts/snapshot.js

      - name: Commit & push (if changed)
        run: |
          set -euo pipefail
          git config user.name "crr5-snapshot-bot"
          git config user.email "crr5-snapshot-bot@users.noreply.github.com"

          # evita falha se tiver commit novo no remoto
          git pull --rebase origin main || true

          if [ -n "$(git status --porcelain)" ]; then
            git add data/*.json || true
            git add month/*.json || true
            git commit -m "chore(snapshot): daily snapshot + monthly close"
            git push
          else
            echo "No changes to commit."
          fi
