name: Snapshot diário CRR5 (D-1) + Fechamento Mensal

on:
  workflow_dispatch:
  schedule:
    # Diário (D-1) — 00:10 BRT (UTC-3) => 03:10 UTC
    - cron: "10 3 * * *"

    # Candidato a fechamento mensal — 23:58 BRT (UTC-3) => 02:58 UTC
    # (só roda nos dias 28-31; o script confirma se é último dia mesmo)
    - cron: "58 2 28-31 * *"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TZ: America/Sao_Paulo
      METRICS_URL: ${{ secrets.METRICS_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Definir modo conforme o cron
        run: |
          MODE="daily"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "10 3 * * *" ]; then
              MODE="daily"
            elif [ "${{ github.event.schedule }}" = "58 2 28-31 * *" ]; then
              MODE="month-close"
            fi
          fi
          echo "RUN_MODE=$MODE" >> $GITHUB_ENV
          echo "Modo selecionado: $MODE"

      - name: Run snapshot
        run: node scripts/snapshot.js

      - name: Commit & push (se mudou)
        run: |
          git config user.name "crr5-snapshot-bot"
          git config user.email "crr5-snapshot-bot@users.noreply.github.com"

          # evita falha se tiver commit novo no remoto
          git pull --rebase origin main || true

          if [ -n "$(git status --porcelain)" ]; then
            git add data month || true
            git commit -m "chore(snapshot): daily snapshot + monthly close"
            git push
          else
            echo "No changes to commit."
          fi
